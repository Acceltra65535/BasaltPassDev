name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: test-secret-for-github-actions
      BASALTPASS_ENV_FILE: /tmp/basaltpass-ci.env
      BASALTPASS_DATABASE_DRIVER: sqlite
      BASALTPASS_DATABASE_DSN: file:basaltpass-ci?mode=memory&cache=shared
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: basaltpass-backend/go.mod
          cache-dependency-path: basaltpass-backend/go.sum
      - name: test
        run: |
          cd basaltpass-backend && go test ./...
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: basaltpass-frontend/package-lock.json
      - name: install deps
        run: |
          cd basaltpass-frontend && npm ci
      - name: build
        run: |
          cd basaltpass-frontend && npm run build
  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: basaltpass-docs/package-lock.json
      - name: install deps
        run: |
          cd basaltpass-docs && npm ci
      - name: build
        run: |
          cd basaltpass-docs && npm run build
