# BasaltPass Backend 配置文件
# 提示：该文件会被自动发现（basaltpass-backend/config/config.yaml）
# 也可通过环境变量 BASALTPASS_CONFIG 指定其他路径。
#
# 约定：
# - 敏感或经常变动的值（如 JWT_SECRET、数据库密码、第三方 Key）放到项目根 `.env`，不要写进该文件。
# - 该文件只放系统级/稳定的默认配置（端口、CORS、默认数据库口径等）。

# 环境：develop / staging / production
env: develop

server:
  # 监听地址（host:port 或 :port）
  address: ":8101"

oidc:
  # 对外公开的 OIDC issuer，必须和 discovery / id_token / introspection 的 iss 完全一致
  # 生产环境建议设置为公网 API 地址，例如 "https://auth.example.com/api/v1"
  issuer: "http://localhost:8101/api/v1"

database:
  # 开发编排默认使用 MySQL；也支持 sqlite
  driver: "mysql"
  # sqlite 数据库存放路径（仅在 driver=sqlite 时使用）
  path: "basaltpass.db"
  # dsn 优先级高于 path；留空则使用 path
  # MySQL DSN 示例: "basaltpass:basaltpass@tcp(127.0.0.1:3307)/basaltpass?charset=utf8mb4&parseTime=True&loc=Local"
  dsn: "basaltpass:basaltpass@tcp(127.0.0.1:3307)/basaltpass?charset=utf8mb4&parseTime=True&loc=Local"

cors:
  # 允许的跨域来源
  allow_origins:
    - "http://localhost:5104"
    - "http://localhost:5104/tenant"
    - "http://localhost:5104/admin"
    - "http://127.0.0.1:5104"
  # 允许的方法
  allow_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
  # 允许的头
  allow_headers:
    - "Origin"
    - "Content-Type"
    - "Accept"
    - "Authorization"
    - "X-Requested-With"
    - "Access-Control-Request-Method"
    - "Access-Control-Request-Headers"
    - "X-Tenant-ID"
  allow_credentials: true
  expose_headers:
    - "Authorization"
    - "Content-Length"
    - "Access-Control-Allow-Origin"
    - "Access-Control-Allow-Headers"
    - "Cache-Control"
    - "Content-Language"
    - "Content-Type"
    - "Expires"
    - "Last-Modified"
    - "Pragma"
  max_age_seconds: 86400

# 默认初始管理员账户设置
# 如果配置了 email，系统会在每次启动（或执行迁移）时尝试注入/确保此用户为超级管理员，并绑定为默认租户Owner
# 可以通过环境变量 BASALTPASS_ADMIN_EMAIL 和 BASALTPASS_ADMIN_PASSWORD 覆盖
admin:
  username: "admin"
  email: ""
  password: ""

# 邮件发送配置
# App 可通过 POST /api/v1/s2s/emails/send 让 BasaltPass 代发邮件。
# 生产推荐使用 AWS SES；敏感值建议通过环境变量覆盖：
# BASALTPASS_EMAIL_PROVIDER=aws_ses
# BASALTPASS_EMAIL_AWS_SES_REGION=us-east-1
# BASALTPASS_EMAIL_AWS_SES_ACCESS_KEY_ID=...
# BASALTPASS_EMAIL_AWS_SES_SECRET_ACCESS_KEY=...
# BASALTPASS_EMAIL_FROM=no-reply@example.com
email:
  provider: "aws_ses"
  aws_ses:
    region: ""
    access_key_id: ""
    secret_access_key: ""
    configuration_set: ""

# 数据填充
seeding:
  # 是否在空数据库首次启动时注入演示数据
  enabled: false
