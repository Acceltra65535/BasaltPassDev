name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 3 * * 1"

permissions:
  security-events: write
  packages: read
  actions: read
  contents: read

jobs:
  analyze-javascript-typescript:
    name: Analyze JavaScript/TypeScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  analyze-go:
    name: Analyze Go
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          cache-dependency-path: |
            go.sum
            basaltpass-backend/go.sum
            basaltpass-backend/sdk/go/go.sum

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go
          build-mode: manual

      - name: Build Go modules
        shell: bash
        run: |
          set -euo pipefail
          go build ./...
          (cd basaltpass-backend && go build ./...)
          (cd basaltpass-backend/sdk/go && go build ./...)

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
