name: Codex Fix Payment CodeQL Main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: basaltpass-backend/go.mod

      - name: Apply safe uint conversion fix
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('basaltpass-backend/internal/service/payment/service.go')
          text = path.read_text()

          replacements = [
              ('\t"io"\n\t"net/http"', '\t"io"\n\t"math"\n\t"net/http"'),
              ('''\t\t\tif tenantID64, err := strconv.ParseUint(tenantIDStr, 10, 64); err == nil {
\t\t\t\tsecrets = appendUniqueSecret(secrets, findWebhookSecretByTenantID(db, uint(tenantID64)))
\t\t\t}''', '''\t\t\tif tenantID64, err := strconv.ParseUint(tenantIDStr, 10, 64); err == nil {
\t\t\t\tif tenantID := parsePositiveUint64(tenantID64); tenantID > 0 {
\t\t\t\t\tsecrets = appendUniqueSecret(secrets, findWebhookSecretByTenantID(db, tenantID))
\t\t\t\t}
\t\t\t}'''),
              ('''func parseUIntFromAny(v interface{}) uint {
\ts := parseString(v)
\tif s != "" {
\t\tif n, err := strconv.ParseUint(s, 10, 64); err == nil {
\t\t\treturn uint(n)
\t\t}
\t}
\tif n, ok := v.(float64); ok {
\t\treturn uint(n)
\t}
\treturn 0
}''', '''func parsePositiveUint64(n uint64) uint {
\tif n == 0 || n > uint64(^uint(0)) {
\t\treturn 0
\t}
\treturn uint(n)
}

func parsePositiveInt64(n int64) uint {
\tif n <= 0 {
\t\treturn 0
\t}
\treturn parsePositiveUint64(uint64(n))
}

func parsePositiveFloat64(n float64) uint {
\tif n <= 0 || math.Trunc(n) != n || n > float64(^uint(0)) {
\t\treturn 0
\t}
\treturn parsePositiveUint64(uint64(n))
}

func parseUIntFromAny(v interface{}) uint {
\ts := parseString(v)
\tif s != "" {
\t\tif n, err := strconv.ParseUint(s, 10, 64); err == nil {
\t\t\treturn parsePositiveUint64(n)
\t\t}
\t}
\tif n, ok := v.(float64); ok {
\t\treturn parsePositiveFloat64(n)
\t}
\treturn 0
}'''),
              ('''func parseOrderIDFromMetadata(metadata map[string]interface{}) (uint, error) {
\tif metadata == nil {
\t\treturn 0, fmt.Errorf("metadata is nil")
\t}
\tv, ok := metadata["order_id"]
\tif !ok || v == nil {
\t\treturn 0, fmt.Errorf("order_id not found")
\t}

\tswitch typed := v.(type) {
\tcase float64:
\t\tif typed <= 0 {
\t\t\treturn 0, fmt.Errorf("invalid order_id")
\t\t}
\t\treturn uint(typed), nil
\tcase int:
\t\tif typed <= 0 {
\t\t\treturn 0, fmt.Errorf("invalid order_id")
\t\t}
\t\treturn uint(typed), nil
\tcase int64:
\t\tif typed <= 0 {
\t\t\treturn 0, fmt.Errorf("invalid order_id")
\t\t}
\t\treturn uint(typed), nil
\tcase uint:
\t\tif typed == 0 {
\t\t\treturn 0, fmt.Errorf("invalid order_id")
\t\t}
\t\treturn typed, nil
\tcase string:
\t\tparsed, err := strconv.ParseUint(strings.TrimSpace(typed), 10, 64)
\t\tif err != nil || parsed == 0 {
\t\t\treturn 0, fmt.Errorf("invalid order_id string")
\t\t}
\t\treturn uint(parsed), nil
\tdefault:
\t\treturn 0, fmt.Errorf("unsupported order_id type")
\t}
}

func parseSubscriptionIDFromMetadata(metadata map[string]interface{}) (uint, error) {
\tif metadata == nil {
\t\treturn 0, fmt.Errorf("metadata is nil")
\t}
\tv, ok := metadata["subscription_id"]
\tif !ok || v == nil {
\t\treturn 0, fmt.Errorf("subscription_id not found")
\t}

\tswitch typed := v.(type) {
\tcase float64:
\t\tif typed <= 0 {
\t\t\treturn 0, fmt.Errorf("invalid subscription_id")
\t\t}
\t\treturn uint(typed), nil
\tcase int:
\t\tif typed <= 0 {
\t\t\treturn 0, fmt.Errorf("invalid subscription_id")
\t\t}
\t\treturn uint(typed), nil
\tcase int64:
\t\tif typed <= 0 {
\t\t\treturn 0, fmt.Errorf("invalid subscription_id")
\t\t}
\t\treturn uint(typed), nil
\tcase uint:
\t\tif typed == 0 {
\t\t\treturn 0, fmt.Errorf("invalid subscription_id")
\t\t}
\t\treturn typed, nil
\tcase string:
\t\tparsed, err := strconv.ParseUint(strings.TrimSpace(typed), 10, 64)
\t\tif err != nil || parsed == 0 {
\t\t\treturn 0, fmt.Errorf("invalid subscription_id string")
\t\t}
\t\treturn uint(parsed), nil
\tdefault:
\t\treturn 0, fmt.Errorf("unsupported subscription_id type")
\t}
}

func parseInvoiceIDFromMetadata(metadata map[string]interface{}) (uint, error) {
\tif metadata == nil {
\t\treturn 0, fmt.Errorf("metadata is nil")
\t}
\tv, ok := metadata["invoice_id"]
\tif !ok || v == nil {
\t\treturn 0, fmt.Errorf("invoice_id not found")
\t}

\tswitch typed := v.(type) {
\tcase float64:
\t\tif typed <= 0 {
\t\t\treturn 0, fmt.Errorf("invalid invoice_id")
\t\t}
\t\treturn uint(typed), nil
\tcase int:
\t\tif typed <= 0 {
\t\t\treturn 0, fmt.Errorf("invalid invoice_id")
\t\t}
\t\treturn uint(typed), nil
\tcase int64:
\t\tif typed <= 0 {
\t\t\treturn 0, fmt.Errorf("invalid invoice_id")
\t\t}
\t\treturn uint(typed), nil
\tcase uint:
\t\tif typed == 0 {
\t\t\treturn 0, fmt.Errorf("invalid invoice_id")
\t\t}
\t\treturn typed, nil
\tcase string:
\t\tparsed, err := strconv.ParseUint(strings.TrimSpace(typed), 10, 64)
\t\tif err != nil || parsed == 0 {
\t\t\treturn 0, fmt.Errorf("invalid invoice_id string")
\t\t}
\t\treturn uint(parsed), nil
\tdefault:
\t\treturn 0, fmt.Errorf("unsupported invoice_id type")
\t}
}''', '''func parseIDFromMetadata(metadata map[string]interface{}, field string) (uint, error) {
\tif metadata == nil {
\t\treturn 0, fmt.Errorf("metadata is nil")
\t}
\tv, ok := metadata[field]
\tif !ok || v == nil {
\t\treturn 0, fmt.Errorf("%s not found", field)
\t}

\tswitch typed := v.(type) {
\tcase float64:
\t\tif parsed := parsePositiveFloat64(typed); parsed > 0 {
\t\t\treturn parsed, nil
\t\t}
\t\treturn 0, fmt.Errorf("invalid %s", field)
\tcase int:
\t\tif parsed := parsePositiveInt64(int64(typed)); parsed > 0 {
\t\t\treturn parsed, nil
\t\t}
\t\treturn 0, fmt.Errorf("invalid %s", field)
\tcase int64:
\t\tif parsed := parsePositiveInt64(typed); parsed > 0 {
\t\t\treturn parsed, nil
\t\t}
\t\treturn 0, fmt.Errorf("invalid %s", field)
\tcase uint:
\t\tif typed == 0 {
\t\t\treturn 0, fmt.Errorf("invalid %s", field)
\t\t}
\t\treturn typed, nil
\tcase uint64:
\t\tif parsed := parsePositiveUint64(typed); parsed > 0 {
\t\t\treturn parsed, nil
\t\t}
\t\treturn 0, fmt.Errorf("invalid %s", field)
\tcase string:
\t\tparsed, err := strconv.ParseUint(strings.TrimSpace(typed), 10, 64)
\t\tif err != nil {
\t\t\treturn 0, fmt.Errorf("invalid %s string", field)
\t\t}
\t\tif id := parsePositiveUint64(parsed); id > 0 {
\t\t\treturn id, nil
\t\t}
\t\treturn 0, fmt.Errorf("invalid %s string", field)
\tdefault:
\t\treturn 0, fmt.Errorf("unsupported %s type", field)
\t}
}

func parseOrderIDFromMetadata(metadata map[string]interface{}) (uint, error) {
\treturn parseIDFromMetadata(metadata, "order_id")
}

func parseSubscriptionIDFromMetadata(metadata map[string]interface{}) (uint, error) {
\treturn parseIDFromMetadata(metadata, "subscription_id")
}

func parseInvoiceIDFromMetadata(metadata map[string]interface{}) (uint, error) {
\treturn parseIDFromMetadata(metadata, "invoice_id")
}'''),
          ]

          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f'replacement target not found: {old[:80]!r}')
              text = text.replace(old, new, 1)

          path.write_text(text)
          PY

      - name: Format, test, commit fix, and remove workflow
        run: |
          gofmt -w basaltpass-backend/internal/service/payment/service.go
          cd basaltpass-backend
          go test ./internal/service/payment ./internal/service/wallet ./internal/model || echo "::warning::targeted go test failed"
          cd ..
          rm .github/workflows/codex-fix-payment-codeql-main.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add basaltpass-backend/internal/service/payment/service.go .github/workflows/codex-fix-payment-codeql-main.yml
          git commit -m "fix: guard payment metadata uint conversions"
          git push origin HEAD:main
